<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>pH-Rahasia-Ramuan-di-Dapur-Kita</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #fdfbf7; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #main-container { display: flex; gap: 20px; width: 100%; max-width: 1400px; margin-top: 20px; }
        #blocklyDiv { height: 600px; flex: 2; border: 3px solid #8e44ad; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reference-panel { flex: 1; max-width: 300px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        #reference-panel img { max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
        #sidebar { flex: 1; max-width: 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #8e44ad; }
        #beaker-container { position: relative; width: 130px; height: 160px; margin: 15px auto; border: 5px solid #bdc3c7; border-top: none; border-radius: 0 0 25px 25px; overflow: hidden; background: #fff; }
        #liquid { position: absolute; bottom: 0; width: 100%; height: 0%; background: #fff; transition: all 0.6s ease; }
        #status-label { font-weight: bold; font-size: 1.2em; margin-top: 10px; color: #2c3e50; }
        .data-box { background: #f4f6f7; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; border-left: 4px solid #8e44ad; }
        button { background: #8e44ad; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50;">🕵️‍♂️ pH-Rahasia-Ramuan-di-Dapur-Kita</h2>
    <p style="color: #7f8c8d; margin-top: 0;">Campurkan bahan dapurmu dan temukan angka numerasi di balik warnanya!</p>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="reference-panel">
            <h4 style="color: #8e44ad; margin-bottom: 5px;">Peta Warna pH</h4>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/PH_Scale.svg/1200px-PH_Scale.svg.png" alt="Skala pH">
            <p style="font-size: 0.8em; color: #7f8c8d; margin-top: 10px;">Gunakan gambar ini sebagai panduan warnamu!</p>
        </div>

        <div id="sidebar">
            <h3>Gelas Eksperimen</h3>
            <div id="beaker-container">
                <div id="liquid"></div>
            </div>
            <div id="status-label">KOSONG</div>
            <div class="data-box">
                <div><b>Volume:</b> <span id="vol-val">0</span> ml</div>
                <div><b>Angka pH:</b> <span id="ph-val">7.0</span></div>
            </div>
            <button onclick="resetLab()">Cuci Gelas</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Bahan Dapur" colour="210">
            <block type="food_source"></block>
        </category>
        <category name="Mangkuk Pencampur" colour="120">
            <block type="food_mixer"></block>
        </category>
    </xml>

    <script>
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "food_source",
            "message0": "Bahan: %1",
            "args0": [{
                "type": "field_dropdown", "name": "FOOD",
                "options": [
                  ["🍋 Jus Jeruk (Asam)", "2.5"],
                  ["🧪 Cuka Dapur (Asam)", "3.0"],
                  ["🍅 Jus Tomat (Asam Lemah)", "4.5"],
                  ["🥛 Susu Sapi (Hampir Netral)", "6.5"],
                  ["💧 Air Murni (Netral)", "7.0"],
                  ["🍳 Putih Telur (Basa Lemah)", "8.5"],
                  ["🧼 Air Sabun (Basa)", "10.0"],
                  ["🍞 Soda Kue (Basa Kuat)", "12.0"]
                ]
            }],
            "output": "Chemical", "colour": 210
          },
          {
            "type": "food_mixer",
            "message0": "Mangkuk: Campur %1 ml %2 + %3 ml %4",
            "args0": [
              { "type": "field_number", "name": "VOL1", "value": 50, "min": 0 },
              { "type": "input_value", "name": "CHEM1", "check": "Chemical" },
              { "type": "field_number", "name": "VOL2", "value": 50, "min": 0 },
              { "type": "input_value", "name": "CHEM2", "check": "Chemical" }
            ],
            "output": "Chemical", "colour": 120
          }
        ]);

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        function getPHColor(ph) {
            if (ph < 3) return "#ff0000"; 
            if (ph < 5) return "#ff8000"; 
            if (ph < 7) return "#ffff00"; 
            if (ph < 8) return "#00ff00"; 
            if (ph < 10) return "#0000ff"; 
            return "#8000ff"; 
        }

        function getFoodData(block) {
            if (!block) return null;
            if (block.type === 'food_source') {
                const ph = parseFloat(block.getFieldValue('FOOD'));
                block.setColour(getPHColor(ph));
                return { ph: ph, vol: 100 };
            }
            if (block.type === 'food_mixer') {
                const v1 = parseFloat(block.getFieldValue('VOL1')) || 0;
                const v2 = parseFloat(block.getFieldValue('VOL2')) || 0;
                const d1 = getFoodData(block.getInputTargetBlock('CHEM1'));
                const d2 = getFoodData(block.getInputTargetBlock('CHEM2'));
                
                if (!d1 && !d2) return null;
                if (d1 && !d2) return { ph: d1.ph, vol: v1 };
                if (!d1 && d2) return { ph: d2.ph, vol: v2 };
                
                const mixedPH = ((d1.ph * v1) + (d2.ph * v2)) / (v1 + v2);
                return { ph: mixedPH, vol: v1 + v2 };
            }
            return null;
        }

        function updateUI(data) {
            const liquid = document.getElementById('liquid');
            const status = document.getElementById('status-label');
            
            if (!data || data.vol === 0) {
                liquid.style.height = "0%";
                status.innerText = "KOSONG";
                document.getElementById('vol-val').innerText = "0";
                document.getElementById('ph-val').innerText = "7.0";
                return;
            }

            const height = Math.min((data.vol / 500) * 100, 100);
            liquid.style.height = height + "%";
            liquid.style.backgroundColor = getPHColor(data.ph);
            
            document.getElementById('vol-val').innerText = Math.round(data.vol);
            document.getElementById('ph-val').innerText = data.ph.toFixed(1);
            
            if (data.ph < 6.5) status.innerText = "ASAM Kecut 🍋";
            else if (data.ph > 7.5) status.innerText = "BASA Pahit 🧼";
            else status.innerText = "NETRAL Segar 💧";
        }

        function resetLab() { workspace.clear(); updateUI(null); }

        workspace.addChangeListener(() => {
            const blocks = workspace.getAllBlocks(false);
            let finalData = null;
            blocks.forEach(b => { 
                if (!b.getParent()) finalData = getFoodData(b); 
            });
            updateUI(finalData);
        });
    </script>
</body>
</html>
